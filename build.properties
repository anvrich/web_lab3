# === Метаданные проекта ===
project.name=weblab3_demo
project.version=1.0-SNAPSHOT
project.main.class=s373329.weblab3_demo.MainBean

# === Настройки компилятора ===
compile.version=17
encoding=UTF-8

# === Пути к исходникам ===
src.main.java.dir=src/main/java
src.main.resources.dir=src/main/resources
src.test.java.dir=src/test/java

# === Пути к сборке ===
build.classes.dir=build/classes
build.test.classes.dir=build/test-classes
build.test.reports.dir=build/test-reports
build.javadoc.dir=build/javadoc
build.alt.src.dir=build/alt-src
build.alt.classes.dir=build/alt-classes
dist.dir=dist

# === Имена JAR-файлов ===
jar.name=${project.name}-${project.version}.jar
jar.alt.name=${project.name}-alt-${project.version}.jar
zip.team.name=${project.name}-team-${project.version}.zip

# === Зависимости из Maven (~/.m2) ===
lib.jakartaee=${user.home}/.m2/repository/jakarta/platform/jakarta.jakartaee-web-api/10.0.0/jakarta.jakartaee-web-api-10.0.0.jar
lib.lombok=${user.home}/.m2/repository/org/projectlombok/lombok/1.18.42/lombok-1.18.42.jar
lib.primefaces=${user.home}/.m2/repository/org/primefaces/primefaces/13.0.3/primefaces-13.0.3-jakarta.jar
lib.postgresql=${user.home}/.m2/repository/org/postgresql/postgresql/42.7.4/postgresql-42.7.4.jar
lib.junit.api=${user.home}/.m2/repository/org/junit/jupiter/junit-jupiter-api/5.11.0/junit-jupiter-api-5.11.0.jar
lib.junit.standalone=${user.home}/.m2/repository/org/junit/platform/junit-platform-console-standalone/1.11.0/junit-platform-console-standalone-1.11.0.jar

# === Настройки SCP ===
scp.host=helios.se.ifmo.ru
scp.port=2222
scp.user=s373329
scp.remote.path=/home/s373329/
scp.key=${user.home}/.ssh/id_rsa

# === Музыка ===
music.file=/System/Library/Sounds/Hero.aiff

# === Target alt: паттерны замены ===
alt.old.class=MainBean
alt.new.class=MainController
alt.old.var=dataBean
